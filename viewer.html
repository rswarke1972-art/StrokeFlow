<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgMusic" autoplay loop>
  <source src="flute.mp3" type="audio/mpeg">
</audio>
    <button class="back-btn" onclick="goBack()">← Back</button>

  <div class="container">
    <button onclick="toggleMusic()">🎵 Music</button>
  <h1 id="charDisplay"></h1>

  <p id="pinyinDisplay" class="pinyin"></p>

  <div class="info-box">
    <p><strong>Meaning:</strong> <span id="meaning"></span></p>

    <p><strong>Example:</strong> <span id="example"></span></p>
    <p class="example-pinyin" id="examplePinyin"></p>

    <p class="explanation" id="explanation"></p>
  </div>

  <div id="character-target"></div>

  <button onclick="play()">▶ Play</button>
  <button onclick="reset()">Reset</button>
<button onclick="nextStroke()">Next Stroke</button>

</div>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
